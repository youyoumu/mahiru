services:
  backend:
    image: "youyoumu2025/mahiru-backend:latest"
    restart: always
    env_file:
      - .mahiru-backend.env
    volumes:
      - ./storage:/apps/mahiru/storage
    ports:
      - "8100:8100"
    healthcheck:
      test: ["CMD", "sh", "-c", "npm run healthcheck -w @repo/backend"]
      interval: 60s
      retries: 4
      start_period: 4s
      timeout: 2s
  bot:
    image: "youyoumu2025/mahiru-bot:latest"
    restart: always
    env_file:
      - .mahiru-bot.env
    volumes:
      - ./storage:/apps/mahiru/storage
    depends_on:
      backend:
        condition: service_healthy
